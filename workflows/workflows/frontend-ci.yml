# ==============================================================
# AI漫剧前端 CI/CD 工作流
# 技术栈: React 18 + TypeScript + Vite + Vitest
# ==============================================================

name: 前端 CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"

# 并发控制：同一分支只保留最新一次运行
concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  WORKING_DIR: frontend

jobs:
  # ──── 阶段1: 代码检查 ────
  lint:
    name: 代码检查 (Lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: TypeScript 类型检查
        run: npx tsc --noEmit

      - name: ESLint 检查
        run: npx eslint . --max-warnings 0

      - name: Prettier 格式校验
        run: npx prettier --check "src/**/*.{ts,tsx,css,json}"

  # ──── 阶段2: 单元测试 + 组件测试 ────
  test:
    name: 单元测试 (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 运行测试（含覆盖率）
        run: npx vitest run --coverage --reporter=verbose

      - name: 上传覆盖率报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ${{ env.WORKING_DIR }}/coverage/
          retention-days: 7

  # ──── 阶段3: E2E测试 ────
  e2e:
    name: E2E测试 (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps chromium

      - name: 启动开发服务器
        run: npx vite --host 0.0.0.0 &
        env:
          # 测试用环境变量（不含真实API密钥）
          VITE_API_BASE_URL: http://localhost:8000

      - name: 等待服务器就绪
        run: npx wait-on http://localhost:5173

      - name: 运行 E2E 测试
        run: npx playwright test --reporter=html

      - name: 上传 E2E 报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ${{ env.WORKING_DIR }}/playwright-report/
          retention-days: 7

  # ──── 阶段4: 构建 ────
  build:
    name: 构建
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 生产构建
        run: npm run build
        env:
          # 在此注入生产环境变量
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_GA_ID: ${{ secrets.VITE_GA_ID }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.WORKING_DIR }}/dist/
          retention-days: 3

  # ──── 阶段5: 部署到静态托管（分支保护，仅 main 触发） ────
  deploy-preview:
    name: 预览部署 (CloudStudio)
    if: github.ref != 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: 安装依赖 + 构建
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          npm ci
          npm run build

      - name: 部署预览环境
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "📦 预览环境部署完成"
          echo "🔗 访问地址: https://${{ github.ref_name }}--ai-comic-drama.example.com"

  deploy-production:
    name: 生产部署
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.WORKING_DIR }}/dist/

      # 方案A: 部署到 CloudStudio Pages
      - name: 部署到 CloudStudio Pages
        id: deploy
        uses: cloudstudio/pages-action@v1
        with:
          directory: ${{ env.WORKING_DIR }}/dist/
          project-name: ai-comic-drama
        env:
          CLOUDSTUDIO_API_KEY: ${{ secrets.CLOUDSTUDIO_API_KEY }}

      # 方案B: 部署到自有服务器（通过 SSH + rsync）
      # 取消注释以下步骤启用自有服务器部署
      #
      # - name: 部署到自有服务器
      #   run: |
      #     mkdir -p ~/.ssh
      #     echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
      #     chmod 600 ~/.ssh/deploy_key
      #     rsync -avz --delete \
      #       -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
      #       ${{ env.WORKING_DIR }}/dist/ \
      #       ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}

      # 方案C: 部署到阿里云 OSS + CDN 刷新
      #
      # - name: 上传到 OSS
      #   uses: manyuanrong/setup-ossutil@v3
      #   with:
      #     endpoint: ${{ secrets.OSS_ENDPOINT }}
      #     access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
      #     access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
      #
      # - name: 同步文件到 OSS
      #   run: |
      #     ossutil sync ${{ env.WORKING_DIR }}/dist/ oss://${{ secrets.OSS_BUCKET }}/ \
      #       --delete --update
      #
      # - name: 刷新 CDN 缓存
      #   run: |
      #     ossutil cdn refresh --dir oss://${{ secrets.OSS_BUCKET }}/

      - name: 通知部署结果
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ 前端部署成功！"
          else
            echo "❌ 前端部署失败，请检查日志。"
          fi
